<!DOCTYPE html>
<!--
  ASPM Dashboard — development / local preview version.

  This file loads findings from ../scan-results/findings.json via fetch().
  Serve with:  python -m http.server 8080  (run from the repo root)
  Then open:   http://localhost:8080/dashboard/

  For a fully standalone report (no server needed), the CI pipeline generates
  scan-results/report.html with the JSON data embedded directly.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASPM Security Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Segoe UI", system-ui, sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    min-height: 100vh;
  }

  header {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 1.25rem 2rem;
  }
  header h1 { font-size: 1.4rem; color: #e6edf3; }
  header .subtitle { font-size: 0.8rem; color: #8b949e; margin-top: .25rem; }

  main { max-width: 1200px; margin: 0 auto; padding: 2rem; }

  /* ── Loading / error states ─────────────────────────────── */
  #loading, #error-msg {
    text-align: center;
    padding: 4rem;
    color: #8b949e;
  }
  #error-msg { color: #ff7070; }

  /* ── Summary cards ──────────────────────────────────────── */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 1rem;
    margin-bottom: 2.5rem;
  }
  .card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 1rem;
    text-align: center;
  }
  .card .count { font-size: 2.2rem; font-weight: 700; line-height: 1; }
  .card .label { font-size: .75rem; color: #8b949e; margin-top: .4rem; text-transform: uppercase; }

  /* ── Source breakdown bar ───────────────────────────────── */
  .source-row {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    margin-bottom: 2.5rem;
  }
  .source-chip {
    background: #21262d;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: .35rem .85rem;
    font-size: .8rem;
  }
  .source-chip .sc-name { color: #8b949e; }
  .source-chip .sc-n    { color: #e6edf3; font-weight: 700; margin-left: .4rem; }

  /* ── Toxic combinations ─────────────────────────────────── */
  .section-title {
    font-size: 1rem;
    font-weight: 600;
    color: #e6edf3;
    margin-bottom: 1rem;
    padding-bottom: .5rem;
    border-bottom: 1px solid #30363d;
  }

  #toxic-section { margin-bottom: 2.5rem; }
  .toxic-card {
    background: #1a0a0a;
    border: 1px solid #ff4d4d44;
    border-left: 4px solid #ff4d4d;
    border-radius: 6px;
    padding: 1rem 1.25rem;
    margin-bottom: .75rem;
  }
  .toxic-card .tc-title { font-weight: 600; color: #ff7070; margin-bottom: .4rem; }
  .toxic-card .tc-desc  { font-size: .85rem; color: #aaaaaa; line-height: 1.5; }

  /* ── Filters ────────────────────────────────────────────── */
  .filters {
    display: flex;
    gap: .75rem;
    flex-wrap: wrap;
    margin-bottom: 1rem;
  }
  .filters select, .filters input {
    background: #161b22;
    border: 1px solid #30363d;
    color: #c9d1d9;
    border-radius: 6px;
    padding: .4rem .75rem;
    font-size: .85rem;
  }
  .filters select:focus, .filters input:focus {
    outline: none;
    border-color: #58a6ff;
  }

  /* ── Findings table ─────────────────────────────────────── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: .82rem; }
  thead th {
    background: #161b22;
    color: #8b949e;
    text-align: left;
    padding: .6rem .75rem;
    font-weight: 600;
    border-bottom: 2px solid #30363d;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  thead th:hover { color: #e6edf3; }
  thead th.sorted-asc::after  { content: " ▲"; font-size: .65em; }
  thead th.sorted-desc::after { content: " ▼"; font-size: .65em; }

  tbody tr { border-bottom: 1px solid #21262d; transition: background .1s; }
  tbody tr:hover { background: #161b22; }
  tbody td { padding: .55rem .75rem; vertical-align: top; }

  .sev-badge {
    display: inline-block;
    border-radius: 4px;
    padding: .15rem .5rem;
    font-size: .7rem;
    font-weight: 700;
    white-space: nowrap;
  }
  .tag {
    display: inline-block;
    background: #21262d;
    border-radius: 4px;
    padding: .15rem .5rem;
    font-size: .7rem;
    color: #8b949e;
  }
  .rule-mono { font-family: monospace; font-size: .75rem; color: #58a6ff; word-break: break-all; }
  .file-mono { font-family: monospace; font-size: .75rem; color: #8b949e; white-space: nowrap; }
  .desc-cell { max-width: 360px; }
  .desc-inner {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 340px;
    cursor: help;
  }

  .no-results {
    text-align: center;
    color: #8b949e;
    padding: 3rem;
    font-size: .9rem;
  }

  footer {
    text-align: center;
    color: #8b949e;
    font-size: .75rem;
    padding: 2rem;
    border-top: 1px solid #21262d;
    margin-top: 3rem;
  }
  a { color: #58a6ff; text-decoration: none; }
</style>
</head>
<body>

<header>
  <h1>&#128737; ASPM Security Dashboard</h1>
  <div class="subtitle" id="generated-at">Loading…</div>
</header>

<main>
  <div id="loading">&#9711; Loading findings…</div>
  <div id="error-msg" style="display:none"></div>
  <div id="content" style="display:none">

    <!-- Summary cards -->
    <div class="cards" id="summary-cards"></div>

    <!-- Source breakdown -->
    <div class="source-row" id="source-row"></div>

    <!-- Toxic combinations -->
    <div id="toxic-section" style="display:none">
      <div class="section-title">&#9888;&#65039; Toxic Combinations</div>
      <div id="toxic-list"></div>
    </div>

    <!-- All findings -->
    <div class="section-title">All Findings</div>
    <div class="filters">
      <select id="filter-sev">
        <option value="">All severities</option>
        <option>CRITICAL</option><option>HIGH</option>
        <option>MEDIUM</option><option>LOW</option><option>INFO</option>
      </select>
      <select id="filter-src">
        <option value="">All sources</option>
        <option>semgrep</option><option>gitleaks</option>
        <option>checkov</option><option>correlator</option>
      </select>
      <select id="filter-cat">
        <option value="">All categories</option>
        <option>SECRET</option><option>INJECTION</option>
        <option>CODE_VULN</option><option>MISCONFIG</option>
        <option>TOXIC_COMBINATION</option>
      </select>
      <input id="filter-text" type="search"
             placeholder="Filter by title or file…"
             style="flex:1;min-width:180px">
    </div>
    <div class="table-wrap">
      <table id="findings-table">
        <thead>
          <tr>
            <th data-col="severity">Severity</th>
            <th data-col="source">Source</th>
            <th data-col="category">Category</th>
            <th>Title / Rule</th>
            <th>Description</th>
            <th data-col="file">Location</th>
          </tr>
        </thead>
        <tbody id="findings-body"></tbody>
      </table>
    </div>
    <div class="no-results" id="no-results" style="display:none">
      No findings match the current filters.
    </div>
  </div>
</main>

<footer>
  ASPM Pipeline &bull; <span id="footer-date"></span> &bull;
  <a href="https://semgrep.dev" target="_blank">Semgrep</a> ·
  <a href="https://github.com/gitleaks/gitleaks" target="_blank">Gitleaks</a> ·
  <a href="https://www.checkov.io" target="_blank">Checkov</a>
</footer>

<script>
const SEV_COLOUR = {
  CRITICAL: "#ff4d4d",
  HIGH:     "#ff8c00",
  MEDIUM:   "#ffd700",
  LOW:      "#4db8ff",
  INFO:     "#888888",
};
const SEV_ORDER = { CRITICAL:0, HIGH:1, MEDIUM:2, LOW:3, INFO:4 };

let REPORT = null;
let sortCol = "severity", sortDir = 1;

function esc(s) {
  return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function sevBadge(sev) {
  const c = SEV_COLOUR[sev] || "#888";
  return `<span class="sev-badge" style="background:${c}22;color:${c};border:1px solid ${c}55">${esc(sev)}</span>`;
}

// ── Render summary ───────────────────────────────────────────────────────────
function renderSummary() {
  const s = REPORT.summary;
  const cards = [
    { label:"Total",    count:s.total,                colour:"#e6edf3" },
    { label:"Critical", count:s.by_severity.CRITICAL, colour:SEV_COLOUR.CRITICAL },
    { label:"High",     count:s.by_severity.HIGH,     colour:SEV_COLOUR.HIGH },
    { label:"Medium",   count:s.by_severity.MEDIUM,   colour:SEV_COLOUR.MEDIUM },
    { label:"Low",      count:s.by_severity.LOW,      colour:SEV_COLOUR.LOW },
    { label:"Toxic",    count:s.toxic_combinations,   colour:"#ff4d4d" },
  ];
  document.getElementById("summary-cards").innerHTML = cards.map(c =>
    `<div class="card">
      <div class="count" style="color:${c.colour}">${c.count}</div>
      <div class="label">${c.label}</div>
    </div>`
  ).join("");

  const ts = s.generated_at ? new Date(s.generated_at).toUTCString() : "unknown";
  document.getElementById("generated-at").textContent = `Generated: ${ts}`;
  document.getElementById("footer-date").textContent  = ts;

  // Source chips
  document.getElementById("source-row").innerHTML = Object.entries(s.by_source)
    .filter(([,n]) => n > 0)
    .map(([src, n]) =>
      `<span class="source-chip">
        <span class="sc-name">${esc(src)}</span>
        <span class="sc-n">${n}</span>
      </span>`
    ).join("");
}

// ── Render toxic combinations ────────────────────────────────────────────────
function renderToxic() {
  const toxics = REPORT.findings.filter(f => f.category === "TOXIC_COMBINATION");
  if (!toxics.length) return;
  document.getElementById("toxic-section").style.display = "";
  document.getElementById("toxic-list").innerHTML = toxics.map(f =>
    `<div class="toxic-card">
      <div class="tc-title">&#9888; ${esc(f.title)}</div>
      <div class="tc-desc">${esc(f.description)}</div>
    </div>`
  ).join("");
}

// ── Render findings table ────────────────────────────────────────────────────
function renderTable() {
  const sevF  = document.getElementById("filter-sev").value;
  const srcF  = document.getElementById("filter-src").value;
  const catF  = document.getElementById("filter-cat").value;
  const txtF  = document.getElementById("filter-text").value.toLowerCase();

  let rows = REPORT.findings.filter(f => {
    if (sevF && f.severity !== sevF) return false;
    if (srcF && f.source   !== srcF) return false;
    if (catF && f.category !== catF) return false;
    if (txtF) {
      const hay = (f.title + " " + (f.file||"")).toLowerCase();
      if (!hay.includes(txtF)) return false;
    }
    return true;
  });

  // Sort
  rows = [...rows].sort((a, b) => {
    let av = a[sortCol] ?? "", bv = b[sortCol] ?? "";
    if (sortCol === "severity") { av = SEV_ORDER[av] ?? 9; bv = SEV_ORDER[bv] ?? 9; }
    return (av < bv ? -1 : av > bv ? 1 : 0) * sortDir;
  });

  const tbody = document.getElementById("findings-body");
  if (!rows.length) {
    tbody.innerHTML = "";
    document.getElementById("no-results").style.display = "";
    return;
  }
  document.getElementById("no-results").style.display = "none";

  tbody.innerHTML = rows.map(f => {
    const loc = f.file
      ? `${esc(f.file)}${f.line != null ? `:${f.line}` : ""}`
      : "—";
    return `<tr>
      <td>${sevBadge(f.severity)}</td>
      <td><span class="tag">${esc(f.source)}</span></td>
      <td><span class="tag">${esc(f.category)}</span></td>
      <td><span class="rule-mono">${esc(f.title)}</span></td>
      <td class="desc-cell">
        <div class="desc-inner" title="${esc(f.description)}">${esc(f.description)}</div>
      </td>
      <td><span class="file-mono">${loc}</span></td>
    </tr>`;
  }).join("");
}

// ── Sort headers ─────────────────────────────────────────────────────────────
document.querySelectorAll("thead th[data-col]").forEach(th => {
  th.addEventListener("click", () => {
    const col = th.dataset.col;
    document.querySelectorAll("thead th").forEach(t => t.classList.remove("sorted-asc","sorted-desc"));
    if (sortCol === col) {
      sortDir *= -1;
    } else {
      sortCol = col;
      sortDir = 1;
    }
    th.classList.add(sortDir === 1 ? "sorted-asc" : "sorted-desc");
    renderTable();
  });
});

// ── Filter listeners ─────────────────────────────────────────────────────────
["filter-sev","filter-src","filter-cat","filter-text"].forEach(id =>
  document.getElementById(id).addEventListener("input", renderTable)
);

// ── Bootstrap: fetch findings.json ──────────────────────────────────────────
fetch("../scan-results/findings.json")
  .then(r => {
    if (!r.ok) throw new Error(`HTTP ${r.status} — ${r.statusText}`);
    return r.json();
  })
  .then(data => {
    REPORT = data;
    document.getElementById("loading").style.display  = "none";
    document.getElementById("content").style.display  = "";
    renderSummary();
    renderToxic();
    renderTable();
  })
  .catch(err => {
    document.getElementById("loading").style.display   = "none";
    document.getElementById("error-msg").style.display = "";
    document.getElementById("error-msg").innerHTML =
      `<p>&#10060; Could not load <code>scan-results/findings.json</code></p>
       <p style="margin-top:.5rem;font-size:.85rem">
         Run the normalizer first, then serve with:<br>
         <code>python -m http.server 8080</code><br>
         or open <code>scan-results/report.html</code> directly.
       </p>
       <p style="margin-top:.5rem;color:#555;font-size:.8rem">${err}</p>`;
  });
</script>
</body>
</html>
