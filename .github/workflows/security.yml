name: ASPM Security Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # 1. SAST — Semgrep
  # ────────────────────────────────────────────────────────────────────────────
  semgrep:
    name: "SAST · Semgrep"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Semgrep
        run: pip install semgrep

      - name: Create results directory
        run: mkdir -p scan-results

      - name: Run Semgrep
        # --config=auto pulls the community rule registry (no token required)
        # exit 0 so the job doesn't fail on findings — we handle severity downstream
        run: |
          semgrep scan \
            --config=auto \
            --json \
            --output=scan-results/semgrep.json \
            . \
          || true

      - name: Upload Semgrep results
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: scan-results/semgrep.json
          if-no-files-found: warn

  # ────────────────────────────────────────────────────────────────────────────
  # 2. Secrets — Gitleaks
  # ────────────────────────────────────────────────────────────────────────────
  gitleaks:
    name: "Secrets · Gitleaks"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so Gitleaks can scan all commits

      - name: Create results directory
        run: mkdir -p scan-results

      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: "8.21.2"
        run: |
          wget -q "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -O /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /usr/local/bin gitleaks
          chmod +x /usr/local/bin/gitleaks
          gitleaks version

      - name: Run Gitleaks (repo scan)
        # --exit-code 0 → don't fail the job; we evaluate severity in normalize.py
        run: |
          gitleaks detect \
            --source . \
            --report-format json \
            --report-path scan-results/gitleaks.json \
            --exit-code 0

      - name: Upload Gitleaks results
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-results
          path: scan-results/gitleaks.json
          if-no-files-found: warn

  # ────────────────────────────────────────────────────────────────────────────
  # 3. IaC — Checkov
  # ────────────────────────────────────────────────────────────────────────────
  checkov:
    name: "IaC · Checkov"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Checkov
        run: pip install checkov

      - name: Create results directory
        run: mkdir -p scan-results

      - name: Run Checkov on infra/
        run: |
          checkov \
            --directory infra \
            --output json \
            --output-file-path scan-results \
            --quiet \
          || true
          # Checkov names the file results_checkov.json — rename for consistency
          mv scan-results/results_checkov.json scan-results/checkov.json 2>/dev/null \
            || echo '{"results":{"failed_checks":[],"passed_checks":[]}}' \
               > scan-results/checkov.json

      - name: Upload Checkov results
        uses: actions/upload-artifact@v4
        with:
          name: checkov-results
          path: scan-results/checkov.json
          if-no-files-found: warn

  # ────────────────────────────────────────────────────────────────────────────
  # 4. Normalize + Dashboard
  # ────────────────────────────────────────────────────────────────────────────
  normalize:
    name: "Normalize · Risk Report"
    runs-on: ubuntu-latest
    needs: [semgrep, gitleaks, checkov]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create results directory
        run: mkdir -p scan-results

      - name: Download Semgrep results
        uses: actions/download-artifact@v4
        with:
          name: semgrep-results
          path: scan-results
        continue-on-error: true

      - name: Download Gitleaks results
        uses: actions/download-artifact@v4
        with:
          name: gitleaks-results
          path: scan-results
        continue-on-error: true

      - name: Download Checkov results
        uses: actions/download-artifact@v4
        with:
          name: checkov-results
          path: scan-results
        continue-on-error: true

      - name: Run normalizer
        run: |
          python pipeline/normalize.py \
            --semgrep  scan-results/semgrep.json \
            --gitleaks scan-results/gitleaks.json \
            --checkov  scan-results/checkov.json \
            --output   scan-results/findings.json \
            --html     scan-results/report.html

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: |
            scan-results/findings.json
            scan-results/report.html
